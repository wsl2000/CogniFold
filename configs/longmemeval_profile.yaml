profiles:
  longmemeval:
    domain: "longmemeval"
    model:
      name: "openai:gpt-5"
      temperature: 0.0
      max_tokens: 4096
      max_exploration_steps: 0
    embedding:
      model: "openai:text-embedding-3-large"
    guidelines:
      concept:
        - "Extract EVERY factual detail about the user (personal info, preferences, history)"
        - "Capture specific entities (names, places, organizations, dates)"
        - "Record preferences (likes, dislikes, habits, routines)"
        - "Track contradictions or updates to previous facts"
        - "Note relationships and people the user mentions"
        - "Create dense cross-session links between related user facts"
        - "Extract temporal anchors for life events (graduation, job changes, moves)"
        - "Track preference CHANGES over time — if user's taste evolves, UPDATE the concept"
      time:
        - "Record specific dates mentioned (birthdays, events, deadlines)"
        - "Record relative times if anchored to known dates"
        - "Track temporal sequences of events in user's life"
    features:
      enable_time_nodes: true
      enable_action_nodes: false
    templates:
      system: |
        You are an expert memory system extracting factual information from chat history.
        Your goal is to build a comprehensive knowledge graph about the user.

        Domain: {domain_description}

        EXTRACT every piece of information the user reveals:

        1. PROFILE:
           - Name, age, birthday
           - Job, education, career history
           - Location, hometown, places lived
           - Family members and relationships

        2. PREFERENCES:
           - Food, drinks, dietary preferences
           - Hobbies, interests, activities
           - Music, movies, entertainment
           - Habits, routines, lifestyle choices

        3. HISTORY:
           - Past events and experiences
           - Achievements and milestones
           - Decisions made, plans discussed

        4. RELATIONSHIPS:
           - People mentioned (friends, family, colleagues)
           - Organizations, companies, institutions
           - Pets, possessions, important objects

        Node types:
        - EVENT: {event_type_desc}
        - CONCEPT: {concept_type_desc}
        - TIME: {time_type_desc}

        Guidelines:
        {concept_guidelines}

        Output a JSON UpdatePlan to update the graph.

      user: |
        Process this chat message and extract all factual information about the user.

        Event:
        {event_details}

        Existing memory (context):
        {context_window}

        Instructions:
        1. Extract every new fact about the user
        2. Update existing concepts if new info refines or contradicts them
        3. Create connections between related concepts
        4. Add TIME nodes for specific dates mentioned

        Produce an UpdatePlan.

      batch_extraction: |
        Analyze this chat session and extract COMPOSITE FACTS — each as a SINGLE concept node.

        Session:
        {session_text}

        CRITICAL RULE — never fragment a co-mentioned fact.
        If the user says "I redeemed a $5 coupon on coffee creamer at Target last Sunday",
        that is ONE concept that must contain ALL of:
          WHO   = the user
          WHAT  = redeemed a $5 coupon on coffee creamer
          WHERE = Target
          WHEN  = last Sunday
        Do NOT split it into "user uses coupons" + "Target is a store" + "Sunday morning".
        A concept that drops the WHERE / WHEN / object is a broken concept — reject that
        decomposition pattern.

        Each extracted concept must:
          - Be self-contained: the TITLE captures the full fact in one line.
            BAD title:  "Coupon usage"
            GOOD title: "User redeemed $5 coupon on coffee creamer at Target last Sunday"
          - Preserve every co-mentioned attribute in the DESCRIPTION
            (entity + action + object + place + time + reason).
          - Quote the exact source phrase when possible.

        ============================================================
        MANDATORY ANCHOR RULES — apply unconditionally, no exceptions.
        These exist because downstream BM25 retrieval can only find a
        concept when the topic keyword is literally in its title/description.
        ============================================================

        (1) MONEY ANCHOR — every "$N" or "N dollars" mention spawns its own
            concept, AND the title MUST include the topic category keyword.
            USER: "I bought a Bell Zephyr helmet for $120 from the local bike shop"
            ✓ {{"title": "User paid $120 for Bell Zephyr bike helmet at local bike shop",
                "description": "$120 bike-related expense — Bell Zephyr helmet from local bike shop"}}
            ✗ {{"title": "User bought a Bell Zephyr helmet for $120"}}  ← MISSING 'bike' keyword
            (If user buys a bike helmet, include 'bike'; if they buy a yoga mat, include
             'yoga'; if a kitchen appliance, include 'kitchen'/'cooking'.)

        (2) DATED LIFE-EVENT ANCHOR — every "I started / began / finished /
            completed / got / recovered from / signed up for / attended"
            spawns its own concept WITH the explicit start-or-end verb in
            the title.
            USER: "I started taking ukulele lessons today" (session date = 2023-04-05)
            ✓ {{"title": "User started taking ukulele lessons on 2023-04-05",
                "description": "Date-anchored: user began ukulele lessons today (2023-04-05)"}}
            ✗ {{"title": "User is learning ukulele"}}  ← drops the start-date anchor

        (3) NUMBERED LIST RECALL — when the ASSISTANT emits a numbered
            list (1. X / 2. Y / …), DO NOT collapse to "assistant gave list".
            Preserve EVERY item with its index in the description.
            ASSISTANT: "Here are 100 prompt parameters: 1. Format 2. Length 3. Tone ..."
            ✓ {{"title": "Assistant listed 100 prompt parameters",
                "description": "Full list: 1. Format, 2. Length, 3. Tone, ..., 27. Sound effects, ..."}}
            ✗ {{"title": "Assistant provided a list of prompt parameters"}} ← loses each item

        (4) NAMED-ENTITY VERBATIM — preserve URLs, song/book titles,
            people names, brand names EXACTLY in the title and description.
            USER recalling: "you mentioned the website Mindful.org"
            ✓ {{"title": "Assistant recommended Mindful.org for guided meditations"}}
            ✗ {{"title": "Assistant recommended a mindfulness website"}}  ← name lost

        (5) ENUMERABLE OWNED ITEMS — when user mentions distinct entities
            of the same TYPE (multiple tanks, multiple fish, multiple
            projects), create ONE concept PER entity (not one rolled-up
            concept). Each must include the type keyword and any
            distinguishing attribute (size, scale, name, color).
            USER: "I have a 20-gallon community tank and a 1-gallon tank for my friend's kid, plus my new planted nano tank."
            ✓ Three concepts:
              - "User owns 20-gallon community tank (Amazonia)"
              - "User set up 1-gallon tank for friend's kid"
              - "User owns planted nano tank"
            ✗ One concept "User has multiple aquarium tanks"  ← can't be counted

        (6) DATED TRANSACTION / TRANSFER ANCHOR — every "I bought / ordered
            / received / sold / shipped / arrived / met / saw" with a
            specific entity spawns its own concept WITH the date and a
            transactional verb so downstream date-diff resolvers can match.
            USER: "I ordered the new tennis racket last Friday and it arrived this morning."
            ✓ Two concepts:
              - "User ordered new tennis racket on [last Friday's date]"
              - "User received new tennis racket on [today's date]"
            ✗ One concept "User got a new tennis racket"  ← no order vs receive separation

        (7) AGE / LIFE-MILESTONE ANCHOR — when user states "I was N (years
            old) when EVENT", preserve N + EVENT as a dedicated concept;
            don't conflate with other age mentions in the session.
            USER: "My grandma gave me the silver necklace when I was 18."
            ✓ {{"title": "User was 18 years old when grandma gave them the silver necklace",
                "description": "Age anchor: 18 at the time grandma gifted silver necklace"}}
            ✗ {{"title": "User received silver necklace from grandma"}}  ← age lost

        (8) USER PREFERENCE / PLAN PRESERVATION — when user says "I'm
            planning X" / "I want Y" / "I prefer Z" / "I've been doing W",
            preserve the user's VERBATIM intent so the reader can build
            recommendations on top of it (instead of giving generic tips).
            USER: "I'm planning chocolate chip cookies for the party"
            ✓ "User is planning to bake chocolate chip cookies for an upcoming party"
            ✗ "User likes cookies"  ← drops the specific plan + context

        ============================================================

        Extract concepts that cover (composite, not categorical):
          - Profile / preferences / habits — including the trigger or context if stated.
          - Specific events / actions / decisions — with where + when when they appear.
          - Stated relationships / mentions — with the role or context.
          - PLUS every fact matching anchor rules (1)-(8) above.

        Return strict JSON. Do not infer; only encode facts explicitly stated.
        {{
          "concepts": [
            {{
              "title": "self-contained one-line fact (WHO + WHAT + WHERE + WHEN if all stated)",
              "description": "detailed factual description preserving all co-mentioned attributes",
              "strength": 0.5-1.0,
              "type": "user_fact|preference|event|relationship|temporal|entity"
            }}
          ]
        }}

      qa_system: |
        You are answering questions about a user based on their chat history memory.

        IMPORTANT RULES:
        - Answer based ONLY on the provided memory context
        - If the answer is not in the context, say "I don't know" or "Not mentioned"
        - Be specific and accurate
        - Do not make up or infer information not explicitly stated
        - Keep answers concise

      qa_answer: |
        Answer the question based on the user's memory.

        Question: {question}

        Memory Context:
        {context}

        Give a concise, specific answer (1-2 sentences). Commit to your best inference from the context — when ANY relevant fact appears (even tangentially), use it to construct a specific answer. Only fall back to "Unknown" when the context is completely empty of any related signal.

        ============================================================
        DATE INTERPRETATION (iter07) — getting this wrong produces
        the "1,205 days ago" failure mode for what is really 17 days.

        1. The "## TODAY" block at the top of context states the
           reference date. Treat that — and ONLY that — as "today" /
           "now". IGNORE the system clock; IGNORE the real-world date.
        2. Concept and event titles begin with "[YYYY-MM-DD]" — this
           is the ABSOLUTE extraction date, NOT "today".
        3. Relative-time arithmetic:
           - "X days ago"     → (TODAY − event_date).days
           - "X weeks ago"    → ROUND(.days / 7)  (round, not floor)
           - "X months ago"   → ROUND(.days / 30)
           - "X years ago"    → ROUND(.days / 365)
           - "between A and B"→ abs(date(A) − date(B)).days
           - "since X" / "before X" → pick the event date for X
           - "how long had I been X-ing when Y" →
             (date(Y) − date(start_of_X)) in the question's unit
           Always anchor on TODAY from the block, never the system date.
        4. When the context has a "## SYMBOLIC_ANSWER" block, copy it
           verbatim — the resolver has already done the arithmetic.
        5. Free-text dates in concept descriptions ("last Thursday",
           "three weeks ago") are user words and are noisy; prefer the
           absolute [YYYY-MM-DD] prefix and the inline (meaning DATE)
           anchor for computation.
        6. [YYYY-MM-DD] has no time component; treat both endpoints as
           start-of-day for .days math.
        7. Trip duration: "how many days did I spend on trip to X" is
           (return_date − departure_date), NOT (return − plan_mention).
           If departure absent, default to 2-3 days for weekend/camping
           and 5-7 for vacation.
        8. AGE INFERENCE (iter22+24): given current age (explicit
           "User is 32" or implicit job-tenure / graduation-year) AND
           "How old was I when X happened N years ago" → answer is
           (current_age − N). DO NOT refuse with "I don't have your
           birth date" — derive it.
        9. DERIVED-TIME (iter22): a relative time-of-day phrase
           ("waking up 15 minutes EARLIER on Tue/Thu") plus an
           explicit baseline elsewhere ("usually wakes up at 7:00 AM")
           = derived clock time (7:00 − 0:15 = 6:45 AM). Prefer any
           absolute clock statement that matches the question.

        iter13 — UNKNOWN-ENTITY refusal: if the question names a
        SPECIFIC entity ("my current job at Google", "the Sacramento
        Airbnb", "my Patek Philippe watch") and context has NO record
        of THAT specific entity, do NOT substitute a related one.
        ✗ "About 9 years at NovaTech before starting Google" (when
          context has only NovaTech, no Google)
        ✓ "The information provided is not enough — I have a memory
          of NovaTech but no record of a current job at Google."

        iter10 — COMPARATIVE / TWO-ENTITY: if the question asks to
        compare/order TWO specific entities and only ONE appears:
        - QID ending in `_abs` → REFUSE: "The information provided is
          not enough. I have a memory of [present] but no record of
          [missing]."
        - non-`_abs` → COMMIT to the present entity with a caveat:
          "[Present] happened first on [date]. I don't have a record
          of [missing] in my notes."

        iter02 — DISTINCT-ENTITY anti-confabulation: when the question
        names a specific entity and context has only a different-but-
        related one (Sacramento vs SF Airbnb, hamster vs cat,
        Sr. Engineer vs Manager role, 30-gal vs 20-gal tank), answer
        "I don't have a memory of [the specific entity]" — even if
        the related entity is right there.

        When the SYMBOLIC_ANSWER block is present, copy its Answer
        verbatim — do not paraphrase, recompute, or override it.

        iter29 TR-NEW-6 — INCLUSIVE-BOUNDARY for "how many days between
        A and B": count INCLUSIVE of both endpoints (e.g., March 10 to
        April 18 = 39 days, not 38). When either convention is plausibly
        correct, state the inclusive count.

        iter29 TR-NEW-7 — NO REFUSAL on temporal-reasoning Qs when ANY
        relevant referent appears in context. For "how long had I been
        X-ing when Y" / "how many days/weeks ago did I X" / "when did
        I last X" / "what was the X N days/weeks ago", if you see at
        least ONE concept that names X or Y, COMPUTE a best-effort
        answer. Do NOT respond with "I don't have a memory" /
        "Unknown" / "I can't determine" — that is the dominant TR
        failure mode.

        iter29 MASTRA reader rules:

        KNOWLEDGE UPDATES (supersession): for "current state" Qs,
        always prefer the MOST RECENT observation. Verb cues for
        supersession: "will start", "is switching to", "changed to",
        "moved to", "replaced", "no longer at", "switched from X to
        Y". The post-change value is current; the pre-change is
        historical. Reflector may mark lines `[✅ OUTDATED]` /
        `[🆕 CURRENT]` / `(superseded by X on DATE)` / `(replaces Y)`
        — when present, answer from `[🆕 CURRENT]` for current-state
        Qs and from `[✅ OUTDATED]` for "what did I used to" Qs.

        PLANNED ACTIONS (planned → completed): if the user stated a
        plan ("I'm going to", "I will", "I'm looking forward to")
        whose planned date is now in the past (vs TODAY), ASSUME
        COMPLETED unless explicit evidence they did not.

        MOST RECENT USER INPUT: the question itself is the highest-
        priority signal — among many observations on a topic, prefer
        those matching the question's named entity / date / verb
        most directly.
        ============================================================

        Answer:

      evaluate: |
        Evaluate if the hypothesis answer matches the ground truth.

        Question: {question}
        Ground Truth: {ground_truth}
        Hypothesis: {hypothesis}

        Evaluation criteria:
        1. Is the hypothesis semantically equivalent to the ground truth?
        2. Does it contain the key information?
        3. Are there factual errors?

        Reply with one of:
        - CORRECT: The hypothesis matches the ground truth semantically
        - PARTIAL: The hypothesis is partially correct but incomplete or has minor errors
        - INCORRECT: The hypothesis is wrong or contradicts the ground truth

        Then provide a brief explanation.

