profiles:
  personal-v1:
    domain: personal-timeline
    mode: quick
    model: {}
    guidelines: {}
    templates: {}
    features: {}
  wiki-v1:
    domain: wiki
    mode: analytical
    model:
      temperature: 0.4
    guidelines:
      concept:
        - Create concepts when multiple chunks share a clear theme or recurring terminology
        - Prefer updating/strengthening existing concepts over creating duplicates
        - Use MERGE_NODES to consolidate overlapping concepts from different documents
        - Use hierarchical concepts to group subtopics (Level 1 specific, Level 2 category, Level 3 abstract)
      action:
        - Create actions for synthesis: summarize, compare, extract definitions, draft follow-up notes
        - Avoid actions for every chunk; prefer actions derived from strong recurring concepts
    templates: {}
    features:
      enable_time_nodes: false
  wiki-v4-openai:
    domain: wiki
    mode: analytical
    model:
      name: openai:gpt-5.2-2025-12-11
      temperature: 0.3
    guidelines:
      concept:
        - Create concepts when multiple chunks share a clear theme or recurring terminology
        - Prefer updating/strengthening existing concepts over creating duplicates
        - Use MERGE_NODES to consolidate overlapping concepts from different documents
      action:
        - MANDATORY: Create at least one action when a concept is created or significantly updated.
        - Action types: Summarize, Compare, Extract, TODO.
        - MUST connect action to the concept it is derived from.
        - Prioritize high-value actions (synthesis, connecting dots) over generic review tasks.
    templates:
      system: |
        You are a cognitive graph update agent for Cognifold, specialized in analyzing long-form text (Wiki/Novels).
        
        ## Your Role
        Analyze incoming text chunks (EVENTS) and build a knowledge graph.
        
        ## CRITICAL RULES (Strict Adherence Required)
        1. **Connect Everything**: Every new EVENT node MUST be connected to at least 1-3 relevant CONCEPT nodes if they exist. If no relevant concept exists, CREATE one.
        2. **Mandatory Actions**: Whenever you create or significantly update a CONCEPT, you MUST create at least one ACTION node derived from it.
           - Examples: "Summarize concept", "Check for contradictions", "Extract character list".
        3. **Action Connectivity**: Every ACTION node MUST be connected to the CONCEPT it is derived from using an ADD_EDGE operation.
        4. **JSON Only**: Output pure JSON, no markdown blocks, no commentary.
        
        ## Graph Structure
        - **EVENT**: A chunk of text from the source document.
        - **CONCEPT**: A theme, character, place, or plot point.
        - **ACTION**: A cognitive task (Synthesis, Extraction, Review).
        
        ## Guidelines
        ### Concept Discovery
        {concept_guidelines}
        
        ### Action Generation
        {action_guidelines}
        
        ## Output Format
        Return a JSON object with a "plan" list containing operations.
        
        Example Plan:
        ```json
        {{
          "plan": [
            {{
              "op": "ADD_NODE",
              "node_type": "event",
              "data": {{ "event_id": "e-123", "title": "...", "description": "..." }}
            }},
            {{
              "op": "ADD_NODE",
              "node_type": "concept",
              "data": {{ "concept_id": "c-theme", "title": "Theme X" }},
              "reasoning": "Recurring theme detected"
            }},
            {{
              "op": "ADD_EDGE",
              "source_id": "e-123",
              "target_id": "c-theme"
            }},
            {{
              "op": "ADD_NODE",
              "node_type": "action",
              "data": {{ "action_id": "a-review", "title": "Review Theme X", "status": "pending" }},
              "reasoning": "Need to synthesize Theme X"
            }},
            {{
              "op": "ADD_EDGE",
              "source_id": "a-review",
              "target_id": "c-theme"
            }}
          ]
        }}
        ```
    features:
      enable_time_nodes: false
