        }

        }

        }

        }

        }
        .sidebar-section {
            padding: 15px;
            border-bottom: 1px solid #0f3460;
        }
        .sidebar-section h3 {
            font-size: 12px;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 10px;
        }
        .event-info {
            background: #0f3460;
            border-radius: 8px;
            padding: 12px;
        }
        .event-info .event-type {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            margin-bottom: 8px;
        }
        .event-info .event-title {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 4px;
        }
        .event-info .event-id {
            font-size: 12px;
            color: #888;
        }
        .operations-list {
            max-height: 200px;
            overflow-y: auto;
        }
        .operation {
            background: #0f3460;
            border-radius: 4px;
            padding: 8px 10px;
            margin-bottom: 6px;
            font-size: 12px;
        }
        .operation .op-type {
            font-weight: 600;
            color: #4cc9f0;
        }
        .reasoning {
            background: #0f3460;
            border-radius: 8px;
            padding: 12px;
            font-size: 13px;
            line-height: 1.5;
            max-height: 150px;
            overflow-y: auto;
        }
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .stat {
            background: #0f3460;
            border-radius: 8px;
            padding: 10px;
            text-align: center;
        }
        .stat-value {
            font-size: 24px;
            font-weight: 600;
            color: #4cc9f0;
        }
        .stat-label {
            font-size: 11px;
            color: #888;
            margin-top: 4px;
        }
        .controls {
            background: #16213e;
            padding: 15px 20px;
            border-top: 1px solid #0f3460;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .playback-buttons {
            display: flex;
            gap: 8px;
        }
        .btn {
            background: #0f3460;
            border: none;
            color: #eee;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }
        .btn:hover {
            background: #1a4a7a;
        }
        .btn:active {
            background: #0a2540;
        }
        .btn.primary {
            background: #4cc9f0;
            color: #000;
        }
        .btn.primary:hover {
            background: #7dd8f5;
        }
        .timeline {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .timeline-slider {
            flex: 1;
            -webkit-appearance: none;
            height: 6px;
            border-radius: 3px;
            background: #0f3460;
            outline: none;
        }
        .timeline-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #4cc9f0;
            cursor: pointer;
        }
        .step-indicator {
            font-size: 14px;
            min-width: 80px;
            text-align: center;
        }
        .speed-control {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .speed-control select {
            background: #0f3460;
            border: none;
            color: #eee;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 14px;
        }
        .legend {
            display: flex;
            gap: 15px;
            padding: 10px 20px;
            background: #16213e;
            border-top: 1px solid #0f3460;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
        }
        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        .added-node {
            animation: pulse 0.5s ease-out;
        }
        @keyframes pulse {
            0% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }
        .context-list {
            max-height: 120px;
            overflow-y: auto;
        }
        .context-node {
            display: inline-block;
            background: #0f3460;
            padding: 4px 8px;
            margin: 2px;
            border-radius: 4px;
            font-size: 11px;
            border-left: 3px solid #FFD700;
        }
        .top-nodes-list {

            overflow-y: auto;
        }

            font-size: 12px;
        }

            background: #ffc107;
            color: black;
        }

            color: white;

    },
    "operations": [

    "added_nodes": [

        const nodeColors = {"event": "#4169E1", "concept": "#228B22", "action": "#FF8C00", "time": "#9932CC"};
        const totalSteps = 47;

        // State
        let currentStep = 0;
        let isPlaying = false;
        let playInterval = null;
        let playSpeed = 1;

        // Network
        let network = null;
        let nodes = new vis.DataSet([]);
        let edges = new vis.DataSet([]);

        // Initialize network
        function initNetwork() {
            const container = document.getElementById('network');
            const data = { nodes, edges };
            const options = {
                nodes: {
                    shape: 'dot',
                    font: { color: '#eee', size: 12 },
                    borderWidth: 2,
                },
                edges: {
                    color: { color: '#555', highlight: '#888' },
                    arrows: { to: { enabled: true, scaleFactor: 0.5 } },
                },
                physics: {
                    enabled: true,
                    stabilization: { iterations: 100 },
                },
                interaction: {
                    hover: true,
                    tooltipDelay: 200,
                },
            };
            network = new vis.Network(container, data, options);
        }

        // Render keyframe
        function renderKeyframe(step) {
            const kf = keyframes.find(k => k.step === step);
            if (!kf) return;

            // Update nodes
            const newNodeIds = new Set(kf.nodes.map(n => n.id));
            const existingIds = new Set(nodes.getIds());

            // Remove nodes not in keyframe
            existingIds.forEach(id => {
                if (!newNodeIds.has(id)) {
                    nodes.remove(id);
                }
            });

            // Add/update nodes
            kf.nodes.forEach(node => {
                const nodeType = node.type;
                const color = nodeColors[nodeType] || '#808080';
                const title = node.data.title || node.id;
                const isInContext = kf.context_node_ids.includes(node.id);
                const isNew = kf.added_nodes.includes(node.id);
                const score = kf.scores[node.id] || 0;
                const size = 15 + (score * 35);

                // Build tooltip with explainability info
                let tooltip = `ID: ${node.id}\nType: ${nodeType}\nScore: ${score.toFixed(4)}`;
                if (node.reasoning) {
                    tooltip += `\n\nReasoning: ${node.reasoning}`;
                }
                if (node.grounded_in && node.grounded_in.length > 0) {
                    const groundedStr = node.grounded_in.slice(0, 5).join(', ') + (node.grounded_in.length > 5 ? '...' : '');
                    tooltip += `\nGrounded in: ${groundedStr}`;
                }

                const nodeData = {
                    id: node.id,
                    label: title,
                    color: {
                        background: color,
                        border: isInContext ? '#FFD700' : color,
                        highlight: { background: color, border: '#FF0000' },
                    },
                    borderWidth: isInContext ? 4 : 2,
                    size: size,
                    title: tooltip,
                };

                if (existingIds.has(node.id)) {
                    nodes.update(nodeData);
                } else {
                    nodes.add(nodeData);
                }
            });

            // Update edges
            const newEdges = kf.edges.map(e => ({ from: e.source, to: e.target }));
            const newEdgeKeys = new Set(newEdges.map(e => `${e.from}-${e.to}`));
            const existingEdges = edges.get();
            const existingEdgeKeys = new Set(existingEdges.map(e => `${e.from}-${e.to}`));

            // Remove edges not in keyframe
            existingEdges.forEach(e => {
                const key = `${e.from}-${e.to}`;
                if (!newEdgeKeys.has(key)) {
                    edges.remove(e.id);
                }
            });

            // Add new edges
            newEdges.forEach(e => {
                const key = `${e.from}-${e.to}`;
                if (!existingEdgeKeys.has(key)) {
                    edges.add({ from: e.from, to: e.to });
                }
            });

            // Update UI
            updateUI(kf);
        }

        // Update UI elements
        function updateUI(kf) {
            // Event info
            const typeEl = document.getElementById('event-type');
            typeEl.textContent = kf.event_type || '-';
            typeEl.style.background = nodeColors[kf.event_type] || '#555';

            document.getElementById('event-title').textContent = kf.event_title;
            document.getElementById('event-id').textContent = kf.event_id ? `Step ${kf.step} - ${kf.event_id}` : 'Step 0';

            // Stats
            document.getElementById('node-count').textContent = kf.nodes.length;
            document.getElementById('edge-count').textContent = kf.edges.length;

            // Operations
            const opsList = document.getElementById('operations-list');
            if (kf.operations.length === 0) {
                opsList.innerHTML = '<div class="operation" style="color: #888;">No operations</div>';
            } else {
                opsList.innerHTML = kf.operations.map(op => `
                    <div class="operation">
                        <span class="op-type">${op.op}</span>
                        ${formatOpDetails(op)}
                    </div>
                `).join('');
            }

            // Context window
            const contextList = document.getElementById('context-list');
            if (kf.context_node_ids.length === 0) {
                contextList.innerHTML = '<span style="color: #888; font-size: 12px;">Empty</span>';
            } else {
                contextList.innerHTML = kf.context_node_ids.map(id => `
                    <span class="context-node">${id}</span>
                `).join('');
            }

            // Top Concepts
            updateTopNodes(kf, 'concept', 'top-concepts-list', 5);

            // Top Actions
            updateTopNodes(kf, 'action', 'top-actions-list', 5);

            // Timeline
            document.getElementById('timeline-slider').value = kf.step;
            document.getElementById('step-indicator').textContent = `${kf.step} / ${totalSteps}`;
        }

        function formatOpDetails(op) {
            let details = '';
            let reasoning = '';

            if (op.op === 'ADD_NODE') {
                const data = op.data || {};
                const title = data.title || data.event_id || data.concept_id || data.action_id || 'node';
                details = `: ${op.node_type} "${title}"`;
                if (op.reasoning) {
                    reasoning = `<div style="font-size: 11px; color: #aaa; margin-top: 4px; font-style: italic;">Reasoning: ${op.reasoning}</div>`;
                }
                if (op.grounded_in && op.grounded_in.length > 0) {
                    const groundedStr = op.grounded_in.slice(0, 3).join(', ') + (op.grounded_in.length > 3 ? '...' : '');
                    reasoning += `<div style="font-size: 10px; color: #888; margin-top: 2px;">Grounded in: ${groundedStr}</div>`;
                }
            } else if (op.op === 'ADD_EDGE') {
                details = `: ${op.source_id} → ${op.target_id}`;
            } else if (op.op === 'UPDATE_NODE') {
                details = `: ${op.node_id}`;
                if (op.update_reasoning) {
                    reasoning = `<div style="font-size: 11px; color: #aaa; margin-top: 4px; font-style: italic;">Reason: ${op.update_reasoning}</div>`;
                }
            } else if (op.op === 'REMOVE_NODE') {
                details = `: ${op.node_id}`;
            }
            return details + reasoning;
        }

        // Update top nodes list (concepts or actions)
        function updateTopNodes(kf, nodeType, elementId, maxItems) {
            const container = document.getElementById(elementId);

            // Filter nodes by type and sort by score
            const nodesOfType = kf.nodes
                .filter(n => n.type === nodeType)
                .map(n => ({
                    ...n,
                    score: kf.scores[n.id] || 0
                }))
                .sort((a, b) => b.score - a.score)
                .slice(0, maxItems);

            if (nodesOfType.length === 0) {
                container.innerHTML = '<span style="color: #888; font-size: 12px;">None yet</span>';
                return;
            }

            container.innerHTML = nodesOfType.map(node => {
                const data = node.data || {};
                const title = data.title || node.id;
                const score = node.score.toFixed(4);

                // For actions, show priority if available
                let priorityHtml = '';
                if (nodeType === 'action' && data.priority) {
                    const priorityClass = data.priority.toLowerCase();
                    priorityHtml = `<span class="node-priority ${priorityClass}">${data.priority}</span>`;
                }

                // For concepts, show strength if available
                let strengthHtml = '';
                if (nodeType === 'concept' && data.strength !== undefined) {
                    const strengthPct = Math.round(data.strength * 100);
                    strengthHtml = `<span style="color: #228B22;">Strength: ${strengthPct}%</span>`;
                }

                // Show reasoning on hover
                const reasoningTooltip = node.reasoning ? `title="${node.reasoning}"` : '';

                return `
                    <div class="top-node-item ${nodeType}" ${reasoningTooltip}>
                        <div class="node-title">${title}</div>
                        <div class="node-meta">
                            <span class="node-score">Score: ${score}</span>
                            ${priorityHtml}
                            ${strengthHtml}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Playback controls
        function play() {
            if (currentStep >= totalSteps) {
                currentStep = 0;
            }
            isPlaying = true;
            document.getElementById('btn-play').textContent = '⏸';
            playInterval = setInterval(() => {
                if (currentStep < totalSteps) {
                    currentStep++;
                    renderKeyframe(currentStep);
                } else {
                    pause();
                }
            }, 1000 / playSpeed);
        }

        function pause() {
            isPlaying = false;
            document.getElementById('btn-play').textContent = '▶';
            if (playInterval) {
                clearInterval(playInterval);
                playInterval = null;
            }
        }

        function goToStep(step) {
            pause();
            currentStep = Math.max(0, Math.min(step, totalSteps));
            renderKeyframe(currentStep);
        }

        // Event listeners
        document.getElementById('btn-play').addEventListener('click', () => {
            if (isPlaying) pause();
            else play();
        });

        document.getElementById('btn-prev').addEventListener('click', () => {
            goToStep(currentStep - 1);
        });

        document.getElementById('btn-next').addEventListener('click', () => {
            goToStep(currentStep + 1);
        });

        document.getElementById('btn-start').addEventListener('click', () => {
            goToStep(0);
        });

        document.getElementById('btn-end').addEventListener('click', () => {
            goToStep(totalSteps);
        });

        document.getElementById('timeline-slider').addEventListener('input', (e) => {
            goToStep(parseInt(e.target.value));
        });

        document.getElementById('speed-select').addEventListener('change', (e) => {
            playSpeed = parseFloat(e.target.value);
            if (isPlaying) {
                pause();
                play();
            }
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (isPlaying) pause();
                else play();
            } else if (e.code === 'ArrowLeft') {
                goToStep(currentStep - 1);
            } else if (e.code === 'ArrowRight') {
                goToStep(currentStep + 1);
            } else if (e.code === 'Home') {
                goToStep(0);
            } else if (e.code === 'End') {
                goToStep(totalSteps);
            }
        });

        // Initialize
        initNetwork();
        renderKeyframe(0);
    </script>
