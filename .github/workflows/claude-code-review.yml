name: Claude Code Review

# On-demand only: add the "claude-review" label to a PR to trigger one review.
# Previously this ran automatically on every PR open/push (types: opened,
# synchronize, ready_for_review, reopened), which billed an LLM review per PR
# and red-flagged every PR whenever the auth token was absent. Switched to a
# label trigger so the capability stays available but costs nothing by default.
on:
  pull_request:
    types: [labeled]

jobs:
  claude-review:
    # Only run when the 'claude-review' label is applied to the PR.
    if: github.event.label.name == 'claude-review'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: |
            /code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}
            Write the entire review in English — the summary and every inline
            comment — regardless of the language used in the code or PR description.
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
